<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiDAR ガラス検知シミュレーター</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
  <header id="app-header">
    <h1>LiDAR ガラス検知シミュレーター</h1>
    <span id="fps-counter">0 FPS</span>
  </header>
  <main id="app-main">
    <div class="col-left">
      <section id="panel-map">
        <div class="panel-title">2D 鳥瞰図 <span class="hint">WASD/矢印キーで移動 Q/Eで回転</span></div>
        <canvas id="canvas-map" width="600" height="600"></canvas>
        <div id="vehicle-info">X: 0 Y: 0 θ: 90°</div>
      </section>
      <section id="panel-editor">
        <div class="panel-title">壁エディタ</div>
        <div id="wall-controls">
          <div class="control-row"><label>種類:</label><select id="wall-type"><option value="flat">平面壁</option><option value="bent">屈曲壁</option><option value="curved">曲面壁</option></select></div>
          <div class="control-row"><label>材質:</label><select id="wall-material"><option value="glass">ガラス</option><option value="acrylic">アクリル</option><option value="concrete">コンクリート</option><option value="metal">金属</option></select></div>
          <div class="control-row" id="row-length"><label>長さ (m):</label><input type="range" id="wall-length" min="0.5" max="8" step="0.1" value="3"><span id="val-length">3.0</span></div>
          <div class="control-row" id="row-angle"><label>角度 (°):</label><input type="range" id="wall-angle" min="0" max="360" step="1" value="0"><span id="val-angle">0</span></div>
          <div class="control-row hidden" id="row-bend"><label>屈曲角 (°):</label><input type="range" id="wall-bend" min="30" max="180" step="1" value="90"><span id="val-bend">90</span></div>
          <div class="control-row hidden" id="row-radius"><label>曲率半径 (m):</label><input type="range" id="wall-radius" min="1" max="10" step="0.1" value="3"><span id="val-radius">3.0</span></div>
          <div class="control-row hidden" id="row-arc"><label>弧の角度 (°):</label><input type="range" id="wall-arc" min="10" max="180" step="1" value="90"><span id="val-arc">90</span></div>
          <div class="btn-row"><button id="btn-add-wall">壁を追加</button><button id="btn-clear-walls">全削除</button></div>
          <div id="wall-list"></div>
        </div>
      </section>
    </div>
    <div class="col-right">
      <section id="panel-heatmap">
        <div class="panel-title">反射強度ヒートマップ</div>
        <div id="chart-heatmap"></div>
      </section>
      <section id="panel-3d">
        <div class="panel-title">
          反射強度 3Dグラフ
          <div class="camera-controls">
            <span>X軸:</span> <button id="cam-x-m">-</button> <button id="cam-x-p">+</button> |
            <span>Y軸:</span> <button id="cam-y-m">-</button> <button id="cam-y-p">+</button> |
            <span>Z軸:</span> <button id="cam-z-m">-</button> <button id="cam-z-p">+</button>
          </div>
        </div>
        <div id="chart-3d"></div>
      </section>
    </div>
  </main>
  <script src="physics.js"></script>
  <script src="renderer.js"></script>
  <script src="ui.js"></script>
  <script src="main.js"></script>
</body>
</html>
